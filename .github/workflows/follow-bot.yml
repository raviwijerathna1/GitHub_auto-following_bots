name: GitHub Follow Bot

on:
  schedule:
    - cron: '30 3 * * *'   # 09:00 IST
    - cron: '30 9 * * *'   # 15:00 IST
    - cron: '30 15 * * *'  # 21:00 IST
  workflow_dispatch:

jobs:
  follow-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore Stats Cache
        uses: actions/cache@v4
        with:
          path: bot_stats.json
          key: bot-stats-${{ github.run_id }}
          restore-keys: |
            bot-stats-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Debug Variables
        run: |
          echo "TARGET: $TARGET_USERNAME"
          echo "DAILY: $DAILY_LIMIT"
          echo "FOLLOW: $FOLLOW_LIMIT"
          echo "MIN: $MIN_DELAY"
          echo "MAX: $MAX_DELAY"
        env:
          TARGET_USERNAME: ${{ vars.TARGET_USERNAME }}
          DAILY_LIMIT: ${{ vars.DAILY_LIMIT }}
          FOLLOW_LIMIT: ${{ vars.FOLLOW_LIMIT }}
          MIN_DELAY: ${{ vars.MIN_DELAY }}
          MAX_DELAY: ${{ vars.MAX_DELAY }}

      - name: Run Bot
        env:
          GITHUB_TOKEN: ${{ secrets.FOLLOW_BOT_TOKEN }}
          TARGET_USERNAME: ${{ vars.TARGET_USERNAME }}
          DAILY_LIMIT: ${{ vars.DAILY_LIMIT }}
          FOLLOW_LIMIT: ${{ vars.FOLLOW_LIMIT }}
          MIN_DELAY: ${{ vars.MIN_DELAY }}
          MAX_DELAY: ${{ vars.MAX_DELAY }}
        run: python main.py

      - name: Save Stats Cache
        if: always()
        uses: actions/cache@v4
        with:
          path: bot_stats.json
          key: bot-stats-${{ github.run_id }}
